services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow_api
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "TaskFlow API"
      ENVIRONMENT: "docker"
      DATABASE_URL: "postgresql+asyncpg://taskflow:taskflow@db:5432/taskflow"
      JWT_SECRET_KEY: "docker-secret-key-change-me"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: taskflow_db
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
    ports:
      - "5432:5432"
    volumes:
      - taskflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  taskflow_pg_data: